<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekhon-TV Homepage</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bs icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Responsive CSS -->
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>
    <header class="shadow py-md-3 pt-2">
        <nav class="row g-3 align-items-center container mx-auto">
            <div class="col-md-2 col-12">
                <section class="d-flex align-items-center justify-content-between">
                    <div>
                        <img src="https://ekhon.tv/logo.png" alt="" class="navbar-logo">
                    </div>
                    <div class="d-md-none d-block">
                        <i class="bi bi-list-nested"></i>
                    </div>
                </section>
            </div>
            <div class="col-6">
                <div class=" d-none d-md-block">
                   <ul>
                    <li><i class="bi bi-house-door"></i>&nbsp; মূল পাতা</li>
                    <li><i class="bi bi-clock"></i>&nbsp; সাম্প্রতিক</li>
                    <li><i class="bi bi-camera-video"></i>&nbsp; ভিডিও</li>
                   </ul>
                </div>
            </div>
            <div class="col-4">
                <div class="position-relative d-none d-md-block">
                    <input type="search" class="form-control" placeholder="যা খুঁজতে চান..">
                    <i class="bi bi-search position-absolute translate-middle-y end-0 pe-3 top-50"></i>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <!-- offcanvas -->
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasRightLabel">Offcanvas right</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                ...
            </div>
        </div>
    </main>

    <!-- Bootstrap Js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="assets/JS/script.js"></script>
</body>

</html>
