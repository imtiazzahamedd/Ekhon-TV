<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekhon-TV Homepage</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bs icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Google Fonts - Hind Siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Responsive CSS -->
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>
    <header class="shadow pt-md-3 pt-2 pb-1 pb-md-0">
        <nav class="row g-3 align-items-stretch container mx-auto">
            <div class="col-md-2 col-12">
                <section class="d-flex align-items-center justify-content-between">
                    <div class="navbar-logo-container flex-shrink-1">
                        <img src="https://ekhon.tv/logo.png" alt="" class="navbar-logo">
                    </div>
                    <section class="d-flex align-items-center gap-1 d-md-none">
                        <div class="live">
                            <p class="fw-semibold rounded-pill">সরাসরি</p>
                        </div>
                        <div>
                            <p class="datetime"></p>
                        </div>
                    </section>
                    <section class="d-flex align-items-center gap-2">
                        <div class="d-md-none">
                            <i class="bi bi-search"></i>
                        </div>
                        <div class="d-md-none d-block" type="button" data-bs-toggle="offcanvas"
                            data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">
                            <i class="bi bi-list fs-3"></i>
                        </div>
                    </section>
                </section>
            </div>
            <div class="col-7 d-none d-md-block">
                <div class="header-list d-none d-md-block">
                    <ul>
                        <li class="title-1s active"><i class="bi bi-house-door"></i>&nbsp; মূল পাতা</li>
                        <li class="title-1s"><i class="bi bi-clock"></i>&nbsp; সাম্প্রতিক</li>
                        <li class="title-1s"><i class="bi bi-camera-video"></i>&nbsp; ভিডিও</li>
                    </ul>
                </div>
            </div>
            <div class="col-3 d-none d-md-block pb-md-3">
                <div class="position-relative d-none d-md-block h-100 d-flex align-items-center">
                    <input type="search" class="form-control rounded-pill" placeholder="যা খুঁজতে চান..">
                    <i class="bi bi-search position-absolute translate-middle-y end-0 pe-3 top-50"></i>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <!-- offcanvas -->
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <p class="datetime-big"></p>
            </div>
        </div>
    </main>

    <!-- Bootstrap Js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="assets/JS/script.js"></script>
</body>

</html>
